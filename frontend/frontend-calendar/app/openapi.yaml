openapi: 3.0.0
info:
  title: Платёжный календарь API
  description: |
    ## О системе
    API для управления платежами, поступлениями и платёжным календарём.

    ### Основные возможности
    - Создание и управление заявками на платежи и поступления
    - Отслеживание остатков по счетам в режиме реального времени
    - Выявление и управление кассовыми разрывами
    - Формирование реестров платежей
    - Построение отчётов и выгрузка в Excel
    - Повторяющиеся платежи по расписанию

    ### Аутентификация
    Все защищённые эндпоинты требуют Bearer токен.
    Токен передаётся в заголовке: `Authorization: Bearer {token}`
    Токен получается при логине.

    ### Роли пользователей
    - **initiator** - создаёт заявки на платежи
    - **treasurer** - казначей, управляет календарём и реестрами
    - **manager** - руководитель, утверждает заявки
    - **admin** - полный доступ, управляет пользователями и справочниками

    ### Форматы данных
    - Все суммы передаются в **копейках** (целые числа)
    - Даты в формате `YYYY-MM-DD`

    ### Статусы заявок на платёж
    - `draft` - Черновик
    - `under_approval` - На согласовании
    - `approved` - Согласована
    - `approved_moved` - Согласована с переносом
    - `in_registry` - В реестре
    - `paid` - Оплачена
    - `rejected` - Отклонена

    ### Приоритеты
    - `low` - Низкий
    - `medium` - Средний
    - `high` - Высокий

  version: 1.0.0

servers:
  - url: http://localhost:8000/api
    description: Локальный сервер разработки

tags:
  - name: Auth
    description: Аутентификация
  - name: Accounts
    description: Управление счетами
  - name: Counterparties
    description: Управление контрагентами
  - name: Items
    description: Управление статьями
  - name: Payments
    description: Управление платежами
  - name: Incomes
    description: Управление поступлениями
  - name: Calendar
    description: Платёжный календарь
  - name: Reports
    description: Отчёты
  - name: Registries
    description: Реестры платежей
  - name: RecurringTemplates
    description: Повторяющиеся платежи
  - name: Admin
    description: Администрирование

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Токен доступа, полученный при логине

  schemas:
    # АУТЕНТИФИКАЦИЯ
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@test.com
        password:
          type: string
          format: password
          example: password123

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: Успешный вход
        user:
          $ref: "#/components/schemas/User"
        roles:
          type: array
          items:
            type: string
          example: ["admin", "treasurer"]
        token:
          type: string
          example: "1|abcdefghijklmnopqrstuvwxyz"

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Иван Иванов
        email:
          type: string
          example: admin@test.com
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserCreate:
      type: object
      required:
        - name
        - email
        - password
        - roles
      properties:
        name:
          type: string
          example: Иван Иванов
        email:
          type: string
          format: email
          example: ivan@test.com
        password:
          type: string
          format: password
          example: password123
        roles:
          type: array
          items:
            type: string
            enum: [initiator, treasurer, manager, admin]
          example: ["initiator", "treasurer"]

    # СЧЕТА
    Account:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Расчетный счет ООО Ромашка
        account_number:
          type: string
          example: "40702810123456789012"
        bank_name:
          type: string
          nullable: true
          example: Сбербанк
        bik:
          type: string
          nullable: true
          example: "044525225"
        correspondent_account:
          type: string
          nullable: true
          example: "30101810100000000225"
        initial_balance:
          type: integer
          description: Баланс в копейках
          example: 1000000
        currency_id:
          type: integer
          example: 1
        currency:
          $ref: "#/components/schemas/Currency"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AccountCreate:
      type: object
      required:
        - name
        - account_number
        - initial_balance
        - currency_id
      properties:
        name:
          type: string
          example: Расчетный счет ООО Ромашка
        account_number:
          type: string
          example: "40702810123456789012"
        bank_name:
          type: string
          nullable: true
          example: Сбербанк
        bik:
          type: string
          nullable: true
          example: "044525225"
        correspondent_account:
          type: string
          nullable: true
          example: "30101810100000000225"
        initial_balance:
          type: integer
          minimum: 0
          description: Баланс в копейках (НЕ МОЖЕТ БЫТЬ ОТРИЦАТЕЛЬНЫМ!)
          example: 1000000
        currency_id:
          type: integer
          example: 1

    # КОНТРАГЕНТЫ
    Counterparty:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: ООО Ромашка
        inn:
          type: string
          nullable: true
          example: "7701234567"
        bank_name:
          type: string
          nullable: true
          example: Сбербанк
        bik:
          type: string
          nullable: true
          example: "044525225"
        correspondent_account:
          type: string
          nullable: true
          example: "30101810100000000225"
        current_account:
          type: string
          nullable: true
          example: "40702810100000001234"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CounterpartyCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: ООО Ромашка
        inn:
          type: string
          nullable: true
          example: "7701234567"
        bank_name:
          type: string
          nullable: true
          example: Сбербанк
        bik:
          type: string
          nullable: true
          example: "044525225"
        correspondent_account:
          type: string
          nullable: true
          example: "30101810100000000225"
        current_account:
          type: string
          nullable: true
          example: "40702810100000001234"

    # СТАТЬИ
    Item:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Аренда офиса
        type:
          type: string
          enum: [income, expense]
          example: expense
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ItemCreate:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          example: Аренда офиса
        type:
          type: string
          enum: [income, expense]
          example: expense

    # ВАЛЮТЫ
    Currency:
      type: object
      properties:
        id:
          type: integer
          example: 1
        code:
          type: string
          example: RUB
        name:
          type: string
          example: Российский рубль
        symbol:
          type: string
          example: ₽

    # ПЛАТЕЖИ

    Payment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        amount:
          type: integer
          description: Сумма в копейках
          example: 150000
        planned_date:
          type: string
          format: date
          example: "2026-07-15"
        original_planned_date:
          type: string
          format: date
          nullable: true
          example: "2026-07-15"
        account_id:
          type: integer
          example: 1
        counterparty_id:
          type: integer
          nullable: true
          example: 1
        item_id:
          type: integer
          example: 1
        priority:
          type: string
          enum: [low, medium, high]
          example: high
        status:
          type: string
          enum:
            [
              draft,
              under_approval,
              approved,
              approved_moved,
              in_registry,
              paid,
              rejected,
            ]
          example: draft
        rescheduled_by:
          type: integer
          nullable: true
        rescheduled_at:
          type: string
          format: date-time
          nullable: true
        is_recurring:
          type: boolean
          example: false
        recurring_template_id:
          type: integer
          nullable: true
        account:
          $ref: "#/components/schemas/Account"
        counterparty:
          $ref: "#/components/schemas/Counterparty"
        item:
          $ref: "#/components/schemas/Item"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaymentCreate:
      type: object
      required:
        - amount
        - planned_date
        - account_id
        - item_id
        - priority
      properties:
        amount:
          type: integer
          minimum: 1
          example: 150000
        planned_date:
          type: string
          format: date
          example: "2026-07-15"
        account_id:
          type: integer
          example: 1
        item_id:
          type: integer
          example: 1
        counterparty_id:
          type: integer
          nullable: true
          example: 1
        priority:
          type: string
          enum: [low, medium, high]
          example: high
        status:
          type: string
          enum: [draft, under_approval]
          default: draft
          example: draft

    PaymentUpdate:
      type: object
      properties:
        amount:
          type: integer
          minimum: 1
          example: 150000
        planned_date:
          type: string
          format: date
          example: "2026-07-15"
        account_id:
          type: integer
          example: 1
        item_id:
          type: integer
          example: 1
        counterparty_id:
          type: integer
          nullable: true
          example: 1
        priority:
          type: string
          enum: [low, medium, high]
          example: high
        status:
          type: string
          enum:
            [
              draft,
              under_approval,
              approved,
              approved_moved,
              in_registry,
              paid,
              rejected,
            ]
          example: under_approval

    PaymentApprove:
      type: object
      properties:
        comment:
          type: string
          example: Согласовано

    PaymentReject:
      type: object
      required:
        - comment
      properties:
        comment:
          type: string
          example: Недостаточно средств

    PaymentReschedule:
      type: object
      required:
        - new_date
      properties:
        new_date:
          type: string
          format: date
          example: "2026-07-20"

    PaymentChangeAccount:
      type: object
      required:
        - new_account_id
      properties:
        new_account_id:
          type: integer
          example: 2

    PaymentActionResponse:
      type: object
      properties:
        message:
          type: string
          example: Заявка согласована
        payment:
          $ref: "#/components/schemas/Payment"
        warning:
          type: string
          nullable: true
          example: Внимание! Перенос создает кассовый разрыв

    ApprovalResponse:
      type: object
      properties:
        payment_id:
          type: integer
          example: 1
        payment_status:
          type: string
          example: approved
        total_approvals:
          type: integer
          example: 1
        approvals:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              decision:
                type: string
                enum: [approved, rejected]
                example: approved
              decision_text:
                type: string
                example: Согласовано
              comment:
                type: string
                nullable: true
                example: Согласовано
              user_id:
                type: integer
                example: 1
              user_name:
                type: string
                example: admin
              user_email:
                type: string
                example: admin@test.com
              created_at:
                type: string
                format: date-time
              created_at_formatted:
                type: string
                example: 1 минуту назад

    # ПОСТУПЛЕНИЯ

    Income:
      type: object
      properties:
        id:
          type: integer
          example: 1
        amount:
          type: integer
          description: Сумма в копейках
          example: 500000
        planned_date:
          type: string
          format: date
          example: "2026-07-10"
        account_id:
          type: integer
          example: 1
        counterparty_id:
          type: integer
          nullable: true
          example: 1
        item_id:
          type: integer
          example: 1
        description:
          type: string
          nullable: true
          example: Оплата по договору №123
        is_recurring:
          type: boolean
          example: false
        recurring_template_id:
          type: integer
          nullable: true
        account:
          $ref: "#/components/schemas/Account"
        counterparty:
          $ref: "#/components/schemas/Counterparty"
        item:
          $ref: "#/components/schemas/Item"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IncomeCreate:
      type: object
      required:
        - amount
        - planned_date
        - account_id
        - item_id
      properties:
        amount:
          type: integer
          minimum: 1
          example: 500000
        planned_date:
          type: string
          format: date
          example: "2026-07-10"
        account_id:
          type: integer
          example: 1
        item_id:
          type: integer
          example: 1
        counterparty_id:
          type: integer
          nullable: true
          example: 1
        description:
          type: string
          nullable: true
          example: Оплата по договору №123
        is_recurring:
          type: boolean
          default: false
          example: false

    # КАЛЕНДАРЬ

    CalendarResponse:
      type: object
      properties:
        period:
          type: object
          properties:
            start:
              type: string
              format: date
              example: "2026-07-01"
            end:
              type: string
              format: date
              example: "2026-07-31"
        accounts:
          type: array
          items:
            type: object
            properties:
              account:
                $ref: "#/components/schemas/Account"
              days:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarDay"

    CalendarDay:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2026-07-01"
        incomes:
          type: integer
          description: Сумма поступлений за день в копейках
          example: 500000
        payments:
          type: integer
          description: Сумма платежей за день в копейках
          example: 150000
        balance_start:
          type: integer
          description: Остаток на начало дня в копейках
          example: 1000000
        balance_end:
          type: integer
          description: Остаток на конец дня в копейках
          example: 1350000
        is_cash_gap:
          type: boolean
          description: Является ли день кассовым разрывом
          example: false
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              type:
                type: string
                enum: [income, payment]
                example: payment
              amount:
                type: integer
                example: 150000
              description:
                type: string
                nullable: true
              status:
                type: string
                nullable: true
              priority:
                type: string
                nullable: true
              counterparty:
                type: string
                nullable: true

    TotalBalanceResponse:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2026-07-15"
        total_balance_rub:
          type: integer
          description: Общий баланс в рублях (все валюты сконвертированы)
          example: 2500000
        total_balance_rub_formatted:
          type: string
          example: "25 000.00 ₽"
        balances_by_currency:
          type: object
          additionalProperties:
            type: integer
          example:
            RUB: 1000000
            USD: 5000
            EUR: 3000
        details:
          type: array
          items:
            $ref: "#/components/schemas/AccountBalance"

    AccountBalance:
      type: object
      properties:
        account_id:
          type: integer
          example: 1
        account_name:
          type: string
          example: Расчетный счет
        currency:
          type: string
          example: RUB
        balance:
          type: integer
          example: 1000000
        balance_formatted:
          type: string
          example: "10 000.00 ₽"

    CashGapsResponse:
      type: object
      properties:
        cash_gaps:
          type: array
          items:
            type: object
            properties:
              account_id:
                type: integer
                example: 1
              account_name:
                type: string
                example: Расчетный счет
              date:
                type: string
                format: date
                example: "2026-07-15"
              balance_end:
                type: integer
                example: -50000
              deficit:
                type: integer
                example: 50000
        total_gaps:
          type: integer
          example: 1

    # ОТЧЁТЫ

    PlanFactResponse:
      type: object
      properties:
        period:
          type: object
          properties:
            start:
              type: string
              format: date
              example: "2026-07-01"
            end:
              type: string
              format: date
              example: "2026-07-31"
        incomes:
          type: object
          properties:
            plan:
              type: integer
              example: 1000000
            plan_formatted:
              type: string
              example: "10 000.00 ₽"
            fact:
              type: integer
              example: 850000
            fact_formatted:
              type: string
              example: "8 500.00 ₽"
            execution_percent:
              type: number
              example: 85.0
        payments:
          type: object
          properties:
            plan:
              type: integer
              example: 800000
            plan_formatted:
              type: string
              example: "8 000.00 ₽"
            fact:
              type: integer
              example: 750000
            fact_formatted:
              type: string
              example: "7 500.00 ₽"
            execution_percent:
              type: number
              example: 93.8

    # РЕЕСТРЫ

    Registry:
      type: object
      properties:
        id:
          type: integer
          example: 1
        date:
          type: string
          format: date
          example: "2026-07-15"
        status:
          type: string
          enum: [draft, sent_to_bank, paid]
          example: draft
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RegistryCreate:
      type: object
      required:
        - date
        - status
      properties:
        date:
          type: string
          format: date
          example: "2026-07-15"
        status:
          type: string
          enum: [draft, sent_to_bank, paid]
          example: draft

    RegistryAttachResponse:
      type: object
      properties:
        message:
          type: string
          example: Реестр успешно заполнен заявками!
        registry_id:
          type: integer
          example: 1
        registry_date:
          type: string
          format: date
          example: "2026-07-15"
        added_count:
          type: integer
          example: 3
        total_amount:
          type: integer
          example: 225000
        total_amount_formatted:
          type: string
          example: "2 250.00 ₽"

    # ПОВТОРЯЮЩИЕСЯ ПЛАТЕЖИ

    RecurringTemplate:
      type: object
      properties:
        id:
          type: integer
          example: 1
        type:
          type: string
          enum: [payment, income]
          example: payment
        name:
          type: string
          example: Аренда офиса
        amount:
          type: integer
          example: 150000
        account_id:
          type: integer
          example: 1
        counterparty_id:
          type: integer
          nullable: true
          example: 1
        item_id:
          type: integer
          example: 1
        priority:
          type: string
          enum: [low, medium, high]
          nullable: true
          example: high
        frequency:
          type: string
          enum: [daily, weekly, monthly]
          example: monthly
        start_date:
          type: string
          format: date
          example: "2026-07-01"
        end_date:
          type: string
          format: date
          nullable: true
          example: "2026-12-31"
        last_generated_date:
          type: string
          format: date
          nullable: true
          example: "2026-07-01"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RecurringTemplateCreate:
      type: object
      required:
        - type
        - name
        - amount
        - account_id
        - item_id
        - frequency
        - start_date
      properties:
        type:
          type: string
          enum: [payment, income]
          example: payment
        name:
          type: string
          example: Аренда офиса
        amount:
          type: integer
          minimum: 1
          example: 150000
        account_id:
          type: integer
          example: 1
        counterparty_id:
          type: integer
          nullable: true
          example: 1
        item_id:
          type: integer
          example: 1
        priority:
          type: string
          enum: [low, medium, high]
          nullable: true
          example: high
        frequency:
          type: string
          enum: [daily, weekly, monthly]
          example: monthly
        start_date:
          type: string
          format: date
          example: "2026-07-01"
        end_date:
          type: string
          format: date
          nullable: true
          example: "2026-12-31"

    RecurringTemplateGenerateResponse:
      type: object
      properties:
        message:
          type: string
          example: Заявки сгенерированы
        template_id:
          type: integer
          example: 1
        template_name:
          type: string
          example: Аренда офиса
        generated_count:
          type: integer
          example: 1

    # КУРСЫ ВАЛЮТ

    ExchangeRateResponse:
      type: object
      properties:
        message:
          type: string
          example: Курсы валют успешно синхронизированы с биржи!
        date:
          type: string
          format: date
          example: "2026-07-15"
        rates_in_rub:
          type: object
          properties:
            "1 USD":
              type: string
              example: "85.50 ₽"
            "1 EUR":
              type: string
              example: "95.00 ₽"
            "1 AMD":
              type: string
              example: "0.22 ₽"

    # ИМПОРТ

    ImportResponse:
      type: object
      properties:
        message:
          type: string
          example: Импорт платежей завершен
        imported_count:
          type: integer
          example: 10
        errors:
          type: array
          items:
            type: string
          example: ["Строка 5: Не указан контрагент"]
        error_count:
          type: integer
          example: 1

